<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>URL Shortener Dashboard</h2>

    <section>
        <h3>Create Short URL</h3>
        <input id="longUrl" placeholder="Enter long URL">
        <button onclick="shortenUrl()">Shorten</button>
        <p id="shortUrlResult"></p>
    </section>

    <hr>

    <section>
        <h3>All URLs</h3>
        <button onclick="loadUrls()">Load URLs</button>
        <ul id="urlList"></ul>
    </section>

    <hr>

    <button onclick="logout()">Logout</button>
</div>

<script src="app.js"></script>
</body>
</html>
